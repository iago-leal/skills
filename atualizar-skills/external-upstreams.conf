# external-upstreams.conf
# Skills externas gerenciadas por este sync (além do repo canônico iago-leal/skills).
# Formato por linha: <clone_name>|<remote_url>|<branch>|<path_in_repo>
#   - clone_name:    nome do diretório local em /Users/iagoleal/Desktop/github_repos/
#   - remote_url:    URL HTTPS do remote
#   - branch:        branch a seguir
#   - path_in_repo:  caminho do diretório da SKILL dentro do clone (basename vira o nome da skill em ~/.claude/skills/)
#
# Múltiplas skills do mesmo clone: repita a linha com path_in_repo diferente.
# O script usa sparse-checkout automaticamente para baixar só os paths listados.

EXTERNAL_SKILLS=(
  "anthropics-skills|https://github.com/anthropics/skills.git|main|skills/skill-creator"
)
